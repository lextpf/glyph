name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
      - uses: actions/checkout@v4

      - name: Format check (clang-format)
        run: |
          clang-format --dry-run --Werror src/*.cpp src/*.hpp

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: edffab1bcd2cb5b8c17d6ba34d5651ea0bf82979

      - name: Configure CMake
        run: cmake --preset ci-windows

      - name: Build
        run: cmake --build --preset ci-windows-release

      - name: Stage artifact
        shell: pwsh
        run: |
          $stage = "artifact/SKSE/Plugins"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "build/Release/glyph.dll" $stage
          if (Test-Path "build/Release/glyph.pdb") {
            Copy-Item "build/Release/glyph.pdb" $stage
          } else {
            Write-Host "::warning::glyph.pdb not produced - symbols will not be in the artifact"
          }
          Get-ChildItem -Recurse $stage | Select-Object FullName, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glyph-${{ github.sha }}
          path: artifact/
          if-no-files-found: error
          retention-days: 14
          compression-level: 9
