name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-2022

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: edffab1bcd2cb5b8c17d6ba34d5651ea0bf82979

      - name: Configure CMake
        run: cmake --preset ci-windows

      - name: Build tests
        run: cmake --build --preset ci-windows-tests

      - name: Run tests
        run: ctest --preset ci-windows-release
