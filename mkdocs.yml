site_name: glyph Documentation
use_directory_urls: false

validation:
  links:
    not_found: info
site_description: SKSE overlay for immersive actor nameplates
site_author: lextpf

theme:
  name: material
  custom_dir: docs
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home:
    - index.md

  - API Reference:
    - Core:
      - Core/index.md
      - ConsoleCommands: ConsoleCommands/index.md

    - Rendering:
      - Rendering/index.md
      - Renderer:
        - Renderer/index.md
        - ActorCache: Renderer/ActorCache.md
        - ActorDrawData: Renderer/ActorDrawData.md
        - Disposition: Renderer/Disposition.md
        - DistanceFactors: Renderer/DistanceFactors.md
        - LabelLayout: Renderer/LabelLayout.md
        - LabelStyle: Renderer/LabelStyle.md
        - OcclusionCacheEntry: Renderer/OcclusionCacheEntry.md
        - OrnamentMetrics: Renderer/OrnamentMetrics.md
        - RendererState: Renderer/RendererState.md
        - RenderSeg: Renderer/RenderSeg.md
        - RenderSettingsSnapshot: Renderer/RenderSettingsSnapshot.md
        - SnapshotState: Renderer/SnapshotState.md
      - TextEffects:
        - TextEffects/index.md
        - DualOutlineParams: TextEffects/DualOutlineParams.md
        - OutlineGlowParams: TextEffects/OutlineGlowParams.md
        - ParticleAuraParams: TextEffects/ParticleAuraParams.md
        - ShineParams: TextEffects/ShineParams.md
        - TextVertexSetup: TextEffects/TextVertexSetup.md
        - WaveParams: TextEffects/WaveParams.md
      - Occlusion:
        - Occlusion/index.md
        - Constants: Occlusion/Constants/index.md
      - RenderConstants: RenderConstants/index.md
      - ParticleTextures:
        - ParticleTextures/index.md
        - BlendMode: ParticleTextures/BlendMode.md
      - DebugOverlay:
        - DebugOverlay/index.md
        - Context: DebugOverlay/Context.md
        - Stats: DebugOverlay/Stats.md
      - TextPostProcess: TextPostProcess/index.md

    - Configuration:
      - Configuration/index.md
      - Settings:
        - Settings/index.md
        - AnimColorSettings: Settings/AnimColorSettings.md
        - Color3: Settings/Color3.md
        - DisplaySettings: Settings/DisplaySettings.md
        - DistanceSettings: Settings/DistanceSettings.md
        - EffectParams: Settings/EffectParams.md
        - EffectType: Settings/EffectType.md
        - FontSettings: Settings/FontSettings.md
        - GlowSettings: Settings/GlowSettings.md
        - OcclusionSettings: Settings/OcclusionSettings.md
        - OrnamentSettings: Settings/OrnamentSettings.md
        - ParticleSettings: Settings/ParticleSettings.md
        - ParticleStyle: Settings/ParticleStyle.md
        - Segment: Settings/Segment.md
        - SettingEntry: Settings/SettingEntry.md
        - ShadowOutlineSettings: Settings/ShadowOutlineSettings.md
        - ShineSettings: Settings/ShineSettings.md
        - SpecialTitleDefinition: Settings/SpecialTitleDefinition.md
        - TierDefinition: Settings/TierDefinition.md
        - TransitionSettings: Settings/TransitionSettings.md
        - TypewriterSettings: Settings/TypewriterSettings.md
        - VisualSettings: Settings/VisualSettings.md
        - overloaded: Settings/overloaded.md

    - Hooks:
      - Hooks/index.md

    - Utilities:
      - Utilities/index.md
      - GameState: GameState/index.md
      - Utf8Utils: Utf8Utils/index.md

    - Namespaces:
      - Stl:
        - Stl/index.md
        - EnumStringMap: Stl/EnumStringMap.md
        - "EnumStringMap::Entry": Stl/EnumStringMap/Entry.md
      - "RE (extensions)": RE/index.md
