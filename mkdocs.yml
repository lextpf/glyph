site_name: whois Documentation
use_directory_urls: false

validation:
  links:
    not_found: info
site_description: SKSE overlay for actor info and appearance templates
site_author: lextpf

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections

    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home:
    - index.md
  - API Reference:
    - Core:
      - Core/index.md
      - AppearanceTemplate: AppearanceTemplate/index.md
      - ConsoleCommands: ConsoleCommands/index.md
    - Rendering:
      - Rendering/index.md
      - Renderer:
        - Renderer/index.md
        - Renderer/ActorCache.md
        - Renderer/ActorDrawData.md
        - Renderer/Disposition.md
        - Renderer/LabelLayout.md
        - Renderer/LabelStyle.md
        - Renderer/RenderSeg.md
        - Renderer/RendererState.md
      - TextEffects: TextEffects/index.md
      - Occlusion:
        - Occlusion/index.md
        - Occlusion/Constants/index.md
      - RenderConstants: RenderConstants/index.md
      - ParticleTextures: ParticleTextures/index.md
      - DebugOverlay:
        - DebugOverlay/index.md
        - DebugOverlay/Context.md
        - DebugOverlay/Stats.md
    - Configuration:
      - Configuration/index.md
      - Settings:
        - Settings/index.md
        - Settings/EffectParams.md
        - Settings/EffectType.md
        - Settings/ParticleStyle.md
        - Settings/Segment.md
        - Settings/SpecialTitleDefinition.md
        - Settings/TierDefinition.md
        - Settings/VisualSettings.md
    - Hooks:
      - Hooks/index.md
      - Hooks/PostDisplay.md

    - Utilities:
      - Utilities/index.md
