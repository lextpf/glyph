;; ========================================
;; Contextual Info Row (third nameplate line)
;; ========================================
;; Below the name/level line, an optional "info row" renders contextual
;; actor facts using the smaller level font. Tokens supported:
;;   %r = relationship (Follower / Ally / Hostile / Neutral)
;;   %d = level delta vs player (Weak / Even / Strong / Deadly)
;;   %c = creature type (Beast / Undead / Daedra / Dragon / NPC)
;;   %n, %l, %t also work here.
;;
;; A trailing "?" right after a segment's closing " marks the segment as
;; droppable: if all its tokens expand to empty, the whole segment (its
;; separators included) is omitted instead of leaving an orphan bullet.
;;
;; Set InfoFormat to an empty value to disable the info row entirely.
;; Empty by default: the status icon badges ([Icons] below) replace this
;; text row. Restore the old text look with:
;;   InfoFormat = "%r"? "  •  %d"? "  •  %c"?
InfoFormat =

;; Vertical gap between the main line and the info row, in pixels.
;; Applied only when the info row has at least one non-empty segment.
InfoLineGap = 4.0

;; ========================================
;; Label Strings -- Contextual Tokens
;; ========================================
;; Customize the words rendered by %r / %d / %c. Empty strings render as
;; nothing, which pairs with a trailing "?" segment marker (above) to drop
;; the whole segment when an actor is "Neutral" / "Even" / "NPC".
[Labels]
;; %r relationship
RelationshipFollower = Follower
RelationshipAlly     = Ally
RelationshipNeutral  =
RelationshipHostile  = Hostile

;; %d level delta vs player
LevelDeltaWeak       = Weak
LevelDeltaEven       =
LevelDeltaStrong     = Strong
LevelDeltaDeadly     = Deadly

;; %c creature classification (ActorTypeX keyword based)
CreatureTypeNPC      =
CreatureTypeBeast    = Beast
CreatureTypeUndead   = Undead
CreatureTypeDaedra   = Daedra
CreatureTypeDragon   = Dragon

;; ========================================
;; Level Delta Thresholds
;; ========================================
;; Player-relative level boundaries that map an actor onto the four
;; %d buckets. Must be strictly ordered Weak < Strong < Deadly or the
;; defaults are restored at parse time.
[LevelDelta]
WeakAtOrBelow   = -5
StrongAtOrAbove = 5
DeadlyAtOrAbove = 10

;; ========================================
;; Status Icon Badges
;; ========================================
;; Relationship, threat, and creature type render as a compact strip of icon
;; indicators above the title row (replacing the text info row above). Icons
;; are Font Awesome duotone SVGs rasterized at load time from IconFolder
;; (path relative to the Skyrim directory); each Icon* value is an SVG file
;; name without the extension -- any icon in the folder works. Empty values
;; hide that badge. Colors are R,G,B floats in [0,1]. Icon names hot-reload
;; with the INI.
[Icons]
IconFolder      = Data/SKSE/Plugins/glyph/duotone
IconsEnabled    = true
IconScale       = 1.0
IconDeadlyPulse = true

;; Icon names (duotone SVG file names). Indicators render left-to-right in
;; the order relationship, threat, creature.
IconFollower = shield-halved      ; relationship
IconAlly     = handshake          ; relationship
IconHostile  = skull-crossbones   ; relationship
IconWeak     = caret-down         ; threat
IconStrong   = caret-up           ; threat
IconDeadly   = skull              ; threat, pulsing
IconBeast    = paw                ; creature
IconUndead   = ghost              ; creature
IconDaedra   = fire               ; creature
IconDragon   = dragon             ; creature

;; Badge colors
IconFollowerColor = 0.46, 0.68, 0.84
IconAllyColor     = 0.52, 0.74, 0.50
IconHostileColor  = 0.86, 0.36, 0.32
IconWeakColor     = 0.54, 0.66, 0.80
IconStrongColor   = 0.86, 0.62, 0.32
IconDeadlyColor   = 0.90, 0.28, 0.24
IconCreatureColor = 0.80, 0.74, 0.62

;; --- Expanded always-on slots (more NPC + player indicators) ---
;; Every slot renders for every actor: neutral/inactive states show muted
;; (dimmed + desaturated), active states show lit. Set an Icon empty to hide
;; that state; toggle a whole slot with its *Enabled key. New icon names need
;; matching SVGs in IconFolder (a missing file just leaves that badge blank).
;;
;; NPC slot order: relationship, creature, role, protection, threat, engagement.
;; Player slot order: sneak, engagement, encumbered, bounty.

;; Newly-shown neutral states (previously blank).
IconNeutral  = circle         ; muted relationship
IconHumanoid = user           ; muted creature
IconEven     = equals         ; muted threat

;; NPC role / protection / engagement.
IconGuard     = helmet-battle
IconMerchant  = coins
IconCommoner  = house         ; muted role
IconEssential = certificate
IconProtected = shield-check
IconMortal    = heart         ; muted protection
IconCombat    = swords        ; engagement (also player combat)
IconAlert     = eye
IconIdle      = moon          ; muted engagement (also player idle)

;; Player slots.
IconSneakHidden   = eye-slash
IconSneakDetected = eye
IconSneakOff      = person-walking  ; muted
IconEncumbered    = weight-hanging
IconNormalWeight  = feather         ; muted
IconWanted        = gavel
IconBountyClear   = scale-balanced  ; muted

;; Lit colors for active states.
IconGuardColor         = 0.60, 0.68, 0.84
IconMerchantColor      = 0.84, 0.74, 0.42
IconEssentialColor     = 0.86, 0.78, 0.46
IconProtectedColor     = 0.54, 0.72, 0.86
IconCombatColor        = 0.88, 0.42, 0.30
IconAlertColor         = 0.86, 0.76, 0.40
IconSneakHiddenColor   = 0.50, 0.64, 0.84
IconSneakDetectedColor = 0.86, 0.36, 0.32
IconEncumberedColor    = 0.82, 0.64, 0.40
IconWantedColor        = 0.84, 0.34, 0.30

;; Resting colors -- each "muted" slot carries its own calm hue so the
;; always-on strip reads as a colored spectrum rather than uniform grey.
IconNeutralColor       = 0.56, 0.62, 0.70
IconHumanoidColor      = 0.74, 0.68, 0.58
IconCommonerColor      = 0.60, 0.68, 0.54
IconMortalColor        = 0.76, 0.58, 0.60
IconEvenColor          = 0.60, 0.70, 0.72
IconIdleColor          = 0.56, 0.60, 0.76
IconSneakOffColor      = 0.64, 0.68, 0.60
IconNormalWeightColor  = 0.64, 0.76, 0.70
IconBountyClearColor   = 0.50, 0.70, 0.68
IconMutedColor         = 0.62, 0.64, 0.68

;; Per-slot enables. A disabled active state drops that actor's badge.
IconRelationshipEnabled = true
IconCreatureEnabled     = true
IconThreatEnabled       = true
IconRoleEnabled         = true
IconProtectionEnabled   = true
IconEngagementEnabled   = true
IconCombatStateEnabled  = true
IconAlertStateEnabled   = true
IconSneakEnabled        = true
IconPlayerCombatEnabled = true
IconEncumberedEnabled   = true
IconBountyEnabled       = true

;; Resting look: alpha multiplier and desaturation strength (0..1).
;; Low desat keeps each resting slot's own hue; alpha keeps it subordinate to
;; lit badges. Lower IconMutedAlpha (even to 0) to thin the always-on strip
;; toward a conditional look where only active badges show.
IconMutedAlpha = 0.45
IconMutedDesat = 0.18

;; ========================================
;; Appearance Template Settings
;; ========================================
;; Copy appearance from an existing NPC/follower to the player.
;; Useful for using a pre-made character as a template.
;;
;; Properties:
;;   TemplateFormID        = Hex FormID of the NPC (without load order prefix)
;;   TemplatePlugin        = Plugin file containing the NPC (e.g., MyFollower.esp)
;;   UseTemplateAppearance = Enable/disable the feature (true/false)
;;   TemplateIncludeRace   = Copy the NPC's race (REQUIRED for cross-race templates like Inigo)
;;   TemplateIncludeBody   = Also copy height/body morphs
;;
;; Copies: race (optional), head parts, hair color, tint layers, face morphs, weight
;; Applied on game load when the player is initialized.
;;
;; IMPORTANT: For followers with custom races (Inigo, etc.), you MUST enable
;; TemplateIncludeRace = true, otherwise the head parts won't work!
;;
;; Example for Inigo:
;;   TemplateFormID = 0xD62
;;   TemplatePlugin = Inigo.esp
;;   UseTemplateAppearance = true
;;   TemplateIncludeRace = true
;;   TemplateIncludeBody = true

TemplateFormID = 02002B6C
TemplatePlugin = KukielleSerana.esp
;; The appearance template is applied ONLY via the 'glyph appearance on' console
;; command (or 'glyph appearance on <formid> <plugin>'); it is never auto-applied
;; at game load or new game.  This flag now only gates hot-reload re-apply
;; (together with TemplateReapplyOnReload) -- keep it false so nothing re-applies
;; automatically.
UseTemplateAppearance = false
TemplateIncludeRace = true
TemplateIncludeBody = true

;; FaceGen Options
;; TemplateCopyFaceGen  = Copy FaceGen NIF/tint files (recommended, default true)
;; TemplateCopySkin     = Copy skin textures (risky for custom bodies, default false)
;; TemplateCopyOverlays = Copy RaceMenu overlays if installed (requires NiOverride, default false)
;; TemplateCopyOutfit   = Copy equipped armor from template actor (default false)
;; TemplateReapplyOnReload = Re-apply appearance when hot reload key is pressed (default false)
;; TemplateFaceGenPlugin = Override plugin for FaceGen paths (empty = auto-detect from winning file)
TemplateCopyFaceGen = true
TemplateCopySkin = true
TemplateCopyOverlays = true
TemplateCopyOutfit = true
TemplateReapplyOnReload = true
TemplateFaceGenPlugin =

;; ========================================
;; Focus Target Expanded Nameplate
;; ========================================
;; When enabled, only the actor whose direction from the camera lies inside
;; a small forward cone renders the full title + main + info row stack.
;; Every other actor renders only the main line at reduced alpha (the
;; "ambient" state).  Transitions between ambient and focused are smoothed.
;;
;; The player nameplate is never dimmed and never picked as the focus target.

[Focus]
;; Master toggle.  false = legacy behavior (all actors render the full stack).
FocusEnabled = false

;; Cone half-angle in degrees [0.5, 45].  Smaller = tighter targeting.
FocusConeAngleDegrees = 8.0

;; Max world distance an actor can be from the camera to be eligible for focus.
;; 0 = reuse the global MaxScanDistance from the General/Distance settings.
FocusMaxDistance = 0.0

;; Alpha multiplier applied to non-focused actors [0.05, 1.0].
;; 1.0 = no dim; smaller values make ambient labels less prominent.
;; Title and info rows are always fully hidden on ambient actors regardless.
FocusAmbientDimFactor = 0.55

;; Seconds for the focus crossfade to settle [0.0, 2.0].  0 = instant.
FocusSettleTime = 0.25

;; If true, actors occluded from the player's line of sight cannot be focused.
FocusIgnoreOccluded = true

