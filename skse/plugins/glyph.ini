;; ========================================
;; glyph Configuration
;; ========================================

;; Display Format
;; %t = Title, %n = Actor, %l = Level
Format = "\"%t\"" "%n" "|Lv.%l"

;; ========================================
;; Font Settings
;; ========================================

;; Font paths (relative to Skyrim directory)
NameFontPath     = Data/SKSE/Plugins/glyph/fonts/bd1aab18-7649-4946-9f7b-6ddd6a81311d.ttf
LevelFontPath    = Data/SKSE/Plugins/glyph/fonts/96120cca-4be2-4d10-b10a-b8183ac18467.ttf
TitleFontPath    = Data/SKSE/Plugins/glyph/fonts/56cb786e-c94e-452c-ac54-360c46381de1.ttf
OrnamentFontPath = Data/SKSE/Plugins/glyph/fonts/050986eb-c23a-4891-a951-9fed313e44c2.otf

;; Font sizes
;; Moderate sizes with 4x4 oversampling for crisp text at all distances
NameFontSize     = 205.0
LevelFontSize    = 108.0
TitleFontSize    = 85.0
OrnamentFontSize = 98.0

;; ========================================
;; Ornament Font
;; ========================================
;; Uses a decorative font where each letter is an ornament glyph
;; Place the .otf or .ttf file in Data/SKSE/Plugins/glyph/
;;
;; Ornament format: "LEFT, RIGHT" where LEFT/RIGHT are character strings
;; Example: Ornaments = AC, BD  (shows "AC" on left, "BD" on right)

;; ========================================
;; Distance & Visibility Settings
;; ========================================

;; Distance where names start to fade out
FadeStartDistance = 200.0

;; Distance where names are completely faded out
FadeEndDistance = 2500.0

;; Distance where font size starts to scale down
ScaleStartDistance = 200.0

;; Distance where font size reaches minimum scale
ScaleEndDistance = 2500.0

;; Smallest font size multiplier for distant names (0.1 = 10% of normal size)
;; Names appear as tiny dots at max distance and grow to full size up close
MinimumScale = 0.1

;; Maximum distance to scan for actors
MaxScanDistance = 3000.0

;; ========================================
;; Shadow & Visual Effects
;; ========================================

;; Title shadow offset in pixels (X, Y)
TitleShadowOffsetX = 2.5
TitleShadowOffsetY = 2.5

;; Main text shadow offset in pixels (X, Y) -- used only when EnableSoftShadow = 0
MainShadowOffsetX = 5.0
MainShadowOffsetY = 5.0

;; ----------------------------------------
;; Soft directional drop-shadow
;; Feathered, angled shadow that lifts text off the world with depth -- no
;; background plate. Replaces the hard offset shadow above when enabled.
;; ----------------------------------------

;; Enable the soft directional shadow (0 = hard offset shadow, 1 = soft)
EnableSoftShadow = 1

;; Shadow offset distance along the cast angle, in pixels (0-16)
SoftShadowDistance = 5.0

;; Feather/blur radius of the shadow, in pixels (0-12)
SoftShadowSoftness = 1.8

;; Peak shadow opacity (0.0-1.0)
SoftShadowOpacity = 0.8

;; Shadow cast direction in degrees (0=right, 90=down, 45=down-right)
SoftShadowAngle = 45

;; Feather sample count -- higher is smoother but costs more (4-24)
SoftShadowSamples = 12

;; ========================================
;; Outline Settings
;; ========================================

;; Minimum outline width
OutlineWidthMin = 2.5

;; Additional outline width added for high-tier ranks
OutlineWidthMax = 3.1

;; Use fast 4-directional outlines instead of 8-directional
;; (0 = quality/8-dir, 1 = performance/4-dir)
;; Reduces outline draw calls by half with minimal visual difference
FastOutlines = 0

;; ========================================
;; Dual-Tone Directional Outline
;; Adds a second inner outline tinted with tier color
;; Simulates directional lighting for depth
;; ========================================

;; Enable dual-tone inner outline (0 = disabled, 1 = enabled)
EnableDualOutline = 1

;; How much to blend toward tier color (0.0 = outline color, 1.0 = pure tier color)
InnerOutlineTint = 0.5

;; Inner outline opacity (0.0-1.0)
InnerOutlineAlpha = 0.10

;; Inner outline width as fraction of outer outline (0.1-0.9)
InnerOutlineScale = 0.2

;; Light direction in degrees (0=right, 90=down, 180=left, 270=up, 315=top-right)
DirectionalLightAngle = 315

;; Directional width variation (0.0 = uniform, 0.15 = subtle, 0.5 = dramatic)
DirectionalLightBias = 0.1

;; Subtle tier-color tint for outlines (0.0 = pure black, 0.08 = subtle, 0.25 = max)
OutlineColorTint = 0.25

;; Subtle tier-color tint for shadows (0.0 = pure black, 0.05 = subtle)
ShadowColorTint = 0.15

;; ========================================
;; Outline Glow (White halo behind text outline)
;; Adds a soft luminous border around the text outline for readability
;; ========================================

;; Enable outline glow (0 = disabled, 1 = enabled)
EnableOutlineGlow = 1

;; Glow radius as multiplier of outline width (1.0-4.0)
OutlineGlowScale = 1.2

;; Peak glow opacity (0.0-1.0, 0.12 = subtle)
OutlineGlowAlpha = 0.04

;; Number of concentric glow rings (1-3, more = softer falloff)
OutlineGlowRings = 3

;; Glow color RGB (default: white)
OutlineGlowR = 1.0
OutlineGlowG = 1.0
OutlineGlowB = 1.0

;; Blend glow color with tier color (0 = pure white, 1 = tier-tinted)
OutlineGlowTierTint = 0

;; ========================================
;; Glow/Bloom Effect
;; Adds a soft glow behind text for better readability
;; ========================================

;; Enable glow effect (0 = disabled, 1 = enabled)
EnableGlow = 1

;; Glow spread radius in pixels
GlowRadius = 12.0

;; Glow brightness (0.0 - 1.0, higher = brighter glow)
GlowIntensity = 0.18

;; Number of samples for glow quality (8-16 recommended)
;; Higher values = smoother glow but more performance cost
GlowSamples = 16

;; Color-divide blend strength (0.0 = off, 0.5 = subtle, 1.0 = full)
;; Photoshop-style Color Divide: text appears to emit light into the scene
;; behind it rather than just being drawn on top.  Requires EnableGlow = 1.
GlowDivideStrength = 0.24

;; ========================================
;; Entrance/Exit Transitions
;; Animated nameplate appearance/disappearance
;; ========================================

;; Enable entrance animation (0 = disabled, 1 = enabled)
EnableEntranceAnimation = 1

;; Entrance style: 0 = PopIn, 1 = SlideDown, 2 = Expand
;; All styles are cinematic now: fade + gentle rise into place, no bounce.
EntranceStyle = 2

;; Entrance animation duration in seconds (slow, filmic reveal)
EntranceDuration = 0.90

;; Deprecated: entrances no longer overshoot. Kept for INI compatibility.
EntranceOvershoot = 1.0

;; Enable exit animation (0 = disabled, 1 = enabled)
EnableExitAnimation = 1

;; Exit animation duration in seconds (slow, weighty fade + sink)
ExitDuration = 0.70

;; ========================================
;; Translucent Glow Text
;; Makes the colored text body semi-transparent so the game world
;; shows through, like a light source.  Outlines stay fully opaque.
;; Combine with EnableGlow and EnableShine for the best look.
;; ========================================

;; Text body translucency (0.0 = fully opaque, 0.3 = subtle, 0.6 = ethereal, 1.0 = invisible)
TextGlowAlpha = 0.0

;; Enable shine overlay for top-edge highlight (0 = disabled, 1 = enabled)
EnableShine = 1

;; Shine peak brightness (0.0-1.0)
ShineIntensity = 0.1

;; Shine vertical falloff (higher = sharper edge, 2.0 = default)
ShineFalloff = 2.0

;; ========================================
;; Typewriter Reveal Effect
;; Characters appear one-by-one when a name first shows
;; ========================================

;; Enable typewriter effect (0 = disabled, 1 = enabled)
EnableTypewriter = 1

;; Characters revealed per second (higher = faster reveal)
TypewriterSpeed = 30.0

;; Delay in seconds before reveal starts (0 = immediate)
TypewriterDelay = 0.0

;; ========================================
;; Debug Overlay
;; Shows performance stats, cache info, and actor counts
;; Useful for troubleshooting and performance tuning
;; ========================================

;; Enable debug overlay (0 = disabled, 1 = enabled)
EnableDebugOverlay = 0

;; ========================================
;; Side Ornaments
;; Decorative ornament characters on sides of nameplate text
;; ========================================

;; Enable side ornaments (0 = disabled, 1 = enabled)
EnableOrnaments = 1

;; Size multiplier for ornament characters (default 1.25)
OrnamentScale = 1.25

;; Distance from text to ornaments in pixels (default 12.0)
OrnamentSpacing = 12.0

;; Align ornaments to main text line instead of overall nameplate center
;; 1 = anchor to name/level line (recommended), 0 = center on title+name
OrnamentAnchorToMainLine = 1

;; ========================================
;; Particle Aura
;; ========================================

;; Master enable for particle aura (0 = disabled, 1 = enabled).
;; Which weather sprites actually render is controlled per tier via the
;; [TierN] ParticleTypes key. Valid types (comma-separated, any combination):
;;   Firefly, Rain, Snow, Smoke, Spark, Wisp, Leaf, Aurora, Cherryblossom,
;;   Dust, Mote
EnableParticleAura = 1

;; Particles per type (default 12, lower = better performance)
ParticleCount = 8

;; Base particle size in pixels (on-screen ~= value x 2.7). Default 3.5
ParticleSize = 3.5

;; Particle animation speed multiplier (default 1.0)
ParticleSpeed = 0.7

;; How far particles spread from text in pixels (default 35.0)
ParticleSpread = 42.0

;; Maximum particle opacity (0.0-1.0, default 1.0)
ParticleAlpha = 1.0

;; Particle blend mode
;; 0 = Additive (bright glow, no box artifacts when overlapping)
;; 1 = Screen (visible on all backgrounds, softer)
;; 2 = Alpha (opaque overlay, highest visibility)
ParticleBlendMode = 0

;; Depth/volume strength: scales how strongly per-particle depth drives size,
;; alpha, and motion-amplitude parallax. 0 = flat sheet, 1.5 = exaggerated.
;; (0.0-1.5, default 0.7)
ParticleDepthStrength = 0.7

;; Color warmth: scales the depth warm(primary)<->cool(secondary) temperature
;; mix and the candle apex pulse. 0 = monochrome tier color, 1 = full jewel
;; spread. (0.0-1.0, default 0.5)
ParticleColorWarmth = 0.5

;; Glow strength: alpha of the additive backlight halo drawn behind the crisp
;; sprite (and the gate for the rare specular glint). 0 disables the whole
;; glow+shine pass. (0.0-1.0, default 0.35)
ParticleGlowStrength = 0.35

;; Glow size: halo radius as a multiple of the crisp sprite size. Larger =
;; softer, wider backlight bed. (1.0-4.0, default 2.2)
ParticleGlowSize = 2.2

;; Shine threshold: sine threshold above which a particle's rare specular glint
;; fires. Higher = rarer (whisper-level, never a strobe). (0.0-0.99, default 0.84)
ParticleShineThreshold = 0.84

;; ========================================
;; Display Options
;; ========================================

;; Additional vertical offset above actor's head (in game units)
;; Increase to move nameplates higher, decrease to move lower
VerticalOffset = 12.0

;; Hide the player's own nameplate (0 = show, 1 = hide)
HidePlayer = 0

;; Hide nameplates for creatures/animals (0 = show, 1 = hide)
;; Only shows nameplates for humanoid NPCs when enabled
HideCreatures = 1

;; ========================================
;; Hot Reload
;; Press a key to reload settings without restarting the game
;; ========================================

;; Key code for hot reload (0 = disabled)
;; Common key codes:
;;   End = 35 (0x23)     Home = 36 (0x24)
;;   Insert = 45 (0x2D)  Delete = 46 (0x2E)
;;   F5 = 116 (0x74)     F6 = 117 (0x75)
;;   F7 = 118 (0x76)     F8 = 119 (0x77)
;;   F9 = 120 (0x78)     F10 = 121 (0x79)
;;   F11 = 122 (0x7A)    F12 = 123 (0x7B)
;; See: https://docs.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
ReloadKey = 118

;; ========================================
;; Color & Effect Intensity
;; ========================================

;; Inner text body opacity (1.0 = fully opaque, 0.6 = translucent, 0.0 = invisible)
;; Outlines and shadows are not affected - only the colored text fill.
InnerTextAlpha = 1.0

;; Outline and shadow opacity (1.0 = fully opaque, 0.5 = translucent, 0.0 = invisible)
OutlineAlpha = 0.65

;; ========================================
;; NPC Colors
;; NPCs render flat, white-leaning text -- the tier palettes below apply to
;; the player (and special titles) only. Colors are RGB (0.0 - 1.0).
;; ========================================

;; Neutral NPCs, including merely talkable civilians (plain white)
NpcNeutralColor = 1.0, 1.0, 1.0

;; Actively hostile actors (faint warm lean, reads as near-white)
NpcHostileColor = 1.0, 0.86, 0.84

;; Teammates / followers only (faint cool lean, reads as near-white)
NpcFollowerColor = 0.86, 0.91, 1.0

;; Level readout (dimmed neutral silver)
NpcLevelColor = 0.80, 0.82, 0.86

;; Title text (soft white)
NpcTitleColor = 0.92, 0.93, 0.95

;; ========================================
;; Smoothing
;; ========================================

;; How long alpha changes take to settle (weightier, cinematic)
AlphaSettleTime = 0.52

;; How long size scaling changes take to settle (weightier, cinematic)
ScaleSettleTime = 0.52

;; How long position updates take for NPCs (slightly heavier follow)
PositionSettleTime = 0.28

;; ========================================
;; Motion Trail / Afterimage
;; Fading ghost copies trail behind moving nameplates
;; ========================================

;; Enable motion trail (0 = disabled, 1 = enabled)
EnableMotionTrail = 1

;; Number of ghost copies in the trail (1-8)
TrailLength = 4

;; Peak ghost opacity (0.0-1.0, 0.3 = subtle)
TrailAlpha = 0.3

;; Alpha falloff exponent (higher = faster fade, 2.0 = quadratic)
TrailFalloff = 2.0

;; Minimum pixel distance before trail renders (avoids static ghosting)
TrailMinDistance = 2.0

;; Minimum tier index for trail effect (0 = all tiers)
TrailMinTier = 0

;; ========================================
;; Wave Displacement
;; Subtle sine-wave vertical bobbing per character
;; Creates a "magical floating" feel
;; ========================================

;; Enable wave displacement (0 = disabled, 1 = enabled)
EnableWave = 0

;; Wave height in pixels (subtle: 1.0-2.0, dramatic: 3.0+)
WaveAmplitude = 1.5

;; Number of wave cycles across text width
WaveFrequency = 3.0

;; Animation speed multiplier
WaveSpeed = 1.0

;; Minimum tier index for wave effect (0 = all tiers)
WaveMinTier = 0

;; ========================================
;; How to Add Custom Tiers
;; ========================================
;; 1. Create a new section [TierN] where N is the tier number (0-based)
;; 2. Define Name, MinLevel, MaxLevel, and color values
;; 3. Specify effects for TitleEffect, NameEffect, and LevelEffect
;; 4. You can add as many tiers as you want (not limited to 10)
;; ========================================

;; ========================================
;; Tier Definitions
;; Define level ranges, names, and colors for each tier (0-19)
;; Colors are in RGB format (0.0 - 1.0)
;;
;; Tier palettes color the PLAYER nameplate (and special titles) only --
;; NPCs use the flat NPC Colors above. Colors display exactly as authored
;; here (no internal repick/saturation processing), so author them at the
;; brightness you want on screen.
;;
;; Palette roles:
;;   LeftColor / RightColor           = main name gradient (bright theme tone
;;                                      into a deeper companion of the same family).
;;   TitleLeftColor / TitleRightColor = slightly deeper, richer accent for the rank title.
;;   LevelLeftColor / LevelRightColor = soft pastel readout accent for the level segment.
;;   HighlightColor                   = luminous near-white shimmer/sparkle accent.
;;   ParticleColor                    = particle tint (a touch whiter than the highlight).
;;   OrnamentLeftColor / OrnamentRightColor = tier metal (bright face / shaded edge).
;;                                      Outline/shadow/glow support layers follow
;;                                      these element palettes.
;; ========================================

;; ========================================
;; Available Effect Types:
;; Animated effects are tuned as "whispers" -- perceptible on inspection,
;; not distracting at a glance. Strength/intensity values in each tier are
;; already scaled by internal amplitude caps (~30%), so existing tunings
;; continue to work while reading quieter than before.
;; - None
;; - Gradient
;; - VerticalGradient
;; - DiagonalGradient dirX,dirY
;; - RadialGradient gamma
;; - Shimmer bandWidth,strengthMult
;; - Ember speed,intensity
;; - Aurora speed,waves,intensity,sway
;; - Sparkle density,speed,intensity
;; - Enchant speed,scale,intensity
;; - Frost density,speed,sparkleIntensity
;; - Breathe speed,amplitude             (uniform brightness pulse)
;; - Drift speed,hueRangeDeg             (uniform hue wander)
;; - Mote period,peakAlpha               (single rare twinkle)
;; - Wander speed,amplitude,spread       (per-character async breathing)
;; ========================================
;;
;; Aurora: Flowing northern lights effect
;;   - speed: Animation speed (default 0.5)
;;   - waves: Number of wave cycles across text (default 3.0)
;;   - intensity: Color blend intensity (default 1.0)
;;   - sway: Horizontal curtain sway amount (default 0.3)
;;   - LeftColor = first aurora color
;;   - RightColor = second aurora color
;;
;; Sparkle: Glittering/twinkling stars effect (great for ice/frost)
;;   - density: How many sparkles (0-1, default 0.3)
;;   - speed: Twinkle animation speed (default 2.0)
;;   - intensity: Sparkle brightness (default 1.0)
;;   - Uses HighlightColor for sparkle color
;;
;; Ember: Warm flickering glow (forging/enchanting feel)
;;   - speed: Flicker animation speed (default 0.5)
;;   - intensity: Glow strength (default 0.8)
;;   - Colors shift toward warm orange at bright spots
;;
;; Enchant: Flowing magical energy pattern
;;   - speed: Flow animation speed (default 0.3)
;;   - scale: Noise pattern scale (default 2.0)
;;   - intensity: Energy brightness (default 1.0)
;;   - Uses FBM noise for organic magical flow
;;
;; Frost: Crystalline ice pattern with sparkle
;;   - density: Frost coverage 0-1 (default 0.4)
;;   - speed: Animation speed (default 0.8)
;;   - intensity: Sparkle flash brightness (default 1.0)
;;   - Tints text toward icy blue-white
;;
;; Breathe: Slow uniform brightness pulse (whisper-level presence)
;;   - speed: Pulse frequency in Hz (default 0.25, one cycle per ~4 s)
;;   - amplitude: Brightness swing 0-1 (default 0.06 = +/-6%)
;;   - All text brightens/dims together
;;
;; Drift: Slow uniform hue wander
;;   - speed: Drift frequency in Hz (default 0.08, one cycle per ~12 s)
;;   - hueRangeDeg: Peak hue deviation in degrees (default 8 = +/-4)
;;   - Saturation and value unchanged; only color family wanders
;;
;; Mote: Single rare twinkle
;;   - period: Seconds between twinkles (default 2.5)
;;   - peakAlpha: Peak intensity of the twinkle 0-1 (default 0.4)
;;   - Uses HighlightColor for the mote color
;;   - Only one mote visible at a time, placed deterministically
;;
;; Wander: Per-character asynchronous breathing ("choir")
;;   - speed: Pulse frequency in Hz (default 0.4)
;;   - amplitude: Brightness swing per glyph 0-1 (default 0.05)
;;   - spread: Phase desync 0-1 (default 1.0 = fully random per glyph)
;;   - Each glyph breathes at its own phase
;;
;; ========================================

