;; ========================================
;; Special Titles
;; ========================================
;; Special titles override normal tier styling when an actor's name
;; contains the specified keyword.
;; Properties:
;;   Keyword       = Text to match in actor name (case-insensitive)
;;   DisplayTitle  = Title shown above name (replaces tier title)
;;   Color         = RGB color for nameplate (0.0-1.0)
;;   GlowColor     = RGB color for glow effect (can be more saturated)
;;   ForceOrnaments  = Always show ornaments (true/false)
;;   ForceParticles  = Always show particle effects (true/false)
;;   Priority      = Higher priority titles are checked first
;;   Ornaments     = "LEFT, RIGHT" ornament characters (e.g., "AC, BD")

